<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/img/icon/flavicon.png" type="image/png">
    <link rel="stylesheet" href="css/login.css">
    <title>LOGIN</title>
</head>

<body>

    <div class="popup-login" id="popUpLoginErro">
        <button onclick="fecharPopUp()" class="btn-fechar-popup" id="btnFecharPopUp">X</button>
        <div class="mensagem-erro" id="divExibirErro"></div>
    </div>

    <div class="login" id="idDivLogin">

        <a href="index.html">
            <button class="btn-voltar" id="backBtn"><img class="back-img" src="assets/img/icon/backBtn.png"></button>
        </a>

        <div class="container">
            <img src="assets/img/icon/logo.png" class="logo">
            <hr class="divisoria">
            <h1>ENTRAR</h1>
            <p>Retome sua jornada pelos Nove Reinos</p>
            <hr class="divisoria">

            <div class="login-form">
                <p>E-MAIL:</p>
                <input type="text" id="email_input" placeholder="nome@email.com">
                <p>SENHA:</p>
                <div class="campo-senha">
                    <input type="password" id="senha_input" placeholder="Senha@123">
                    <button id="btnOlho1" class="olho" onclick="verSenha(this)">
                        <img id="olho1" src="assets/img/icon/openEye.png"></button>
                </div>
                <button onclick="entrar()" class="btn-entrar">ENTRAR</button>
            </div>
            <p>Ainda não tem conta? <a href="cadastro.html">Forje a sua</a></p>
        </div>
    </div>

</body>

</html>

<script src="js/mascaraSenha.js"></script>

<script>

    function entrar() {

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        if (emailVar == `` || senhaVar == ``) {
            divExibirErro.innerHTML = `Preencha todos os campos`;
            popUpLoginErro.style.display = "flex";
            idDivLogin.style.filter = "brightness(0.4)";
        } else {
            fetch("/usuarios/autenticar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    emailServer: emailVar,
                    senhaServer: senhaVar
                })
            }).then(function (resposta) {
                console.log("ESTOU NO THEN DO entrar()!")

                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then(json => {
                        console.log(json);
                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id;

                        setTimeout(function () {
                            window.location = "hub.html";
                        }, 1000); // apenas para exibir o loading

                    });

                } else {

                    console.log("Houve um erro ao tentar realizar o login!");

                    resposta.text().then(texto => {
                        console.error(texto);
                        divExibirErro.innerHTML = texto;
                    });
                    popUpLoginErro.style.display = "flex";
                    idDivLogin.style.filter = "brightness(0.4)";

                }

            }).catch(function (erro) {
                console.log(erro);
                divExibirErro.innerHTML = erro;
                popUpLoginErro.style.display = "flex";
                idDivLogin.style.filter = "brightness(0.4)";
            })

            return false;
        }
    }

    function fecharPopUp() {
        popUpLoginErro.style.display = "none";
        idDivLogin.style.filter = "brightness(1)";
    }

</script>
