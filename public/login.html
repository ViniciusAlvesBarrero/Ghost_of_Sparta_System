<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>LOGIN</title>
</head>

<body>

    <div class="login">
        <a href="index.html">
            <button class="btn-voltar" id="backBtn"><img class="back-img" src="assets/img/icon/backBtn.png"></button>
        </a>

        <div class="container">
            <hr class="divisoria">
            <h1>ENTRAR</h1>
            <p>Retome sua jornada pelos Nove Reinos</p>
            <hr class="divisoria">

            <div class="login-form">
                <p>E-MAIL</p>
                <input type="text" id="email" placeholder="Email@gmail.com">
                <p>SENHA</p>
                <input type="password" id="senha" placeholder="Senha@123">
                <button>ENTRAR</button>
            </div>
            <p>Ainda não tem conta? <a href="cadastro.html">Forje a sua</a></p>
        </div>
    </div>

</body>

</html>
